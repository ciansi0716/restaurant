<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>My Food Map</title>
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    body, html {
      height: 100dvh !important; 
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    header {
      padding-top: max(10px, env(safe-area-inset-top)) !important;
      z-index: 2000;
    }
    #view-home .main-content {
      position: relative;
      height: 100%;
      width: 100%;
    }
    #map-container {
      height: 100% !important;
      width: 100%;
      position: absolute;
      top: 0; left: 0;
    }
    #list-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50dvh !important; 
      background: var(--surface, #ffffff);
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }
    #list-container.collapsed {
      transform: translateY(calc(100% - 60px)); 
    }
    .sheet-handle {
      width: 100%;
      height: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .sheet-handle::before {
      content: "";
      width: 40px;
      height: 5px;
      background-color: #ccc;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <header style="justify-content: space-between;">
    <div style="font-size: 18px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px;">
      探店紀錄
    </div>
    <div class="header-actions" style="display: flex; gap: 8px;">
      <button onclick="App.navigate('lists')" style="width: auto; padding: 0 12px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px;">
        美食清單
      </button>
    </div>
  </header>

  <div id="view-home" class="view-container active">
    <div class="search-container" style="position: relative; z-index: 1001; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; gap: 6px;">
      <input type="text" id="search-input" placeholder="搜尋美食、餐廳..." onkeypress="if(event.key === 'Enter') App.searchInCurrentArea()" style="flex: 1;">
      <button onclick="App.searchInCurrentArea()" style="white-space: nowrap; padding: 0 12px;">搜尋</button>
      <button onclick="App.advancedSearch()" style="white-space: nowrap; padding: 0 12px; background-color: #FF7A00; border-color: #FF7A00; color: white;" title="50公里內精準名稱搜尋">進階</button>
    </div>

    <div class="main-content">
      <div id="map-container">
        <div id="map" style="width: 100%; height: 100%; background-color: #e0e0e0;"></div>
        <button id="search-here-btn" class="overlay-btn" style="display:none; top: 10px;" onclick="App.searchInCurrentArea()">
          🔄搜尋這個區域
        </button>
        <button class="overlay-btn filter-btn" style="top: 10px;" onclick="App.showFilterLayerModal()">
          圖層
        </button>
        <button class="overlay-btn locate-btn" style="top: 65px; bottom: auto; right: 20px; width: 44px; height: 44px; padding: 0; justify-content: center;" onclick="App.centerToUserLocation()" title="回到我的位置">
          📍
        </button>
      </div>

      <div id="list-container" class="collapsed">
        <div class="sheet-handle" onclick="App.toggleBottomSheet()"></div>
        <div class="list-header" style="flex-shrink: 0; cursor:pointer; padding-top: 0;" onclick="App.toggleBottomSheet()">
          <span id="result-count">搜尋中...</span>
          <label style="display:flex; align-items:center; gap:5px; cursor:pointer; font-weight:normal;" onclick="event.stopPropagation();">
            <input type="checkbox" id="open-now-toggle" onchange="App.updateVisibleRestaurants()"> 僅顯示營業中
          </label>
        </div>
        <div class="scrollable-list" id="search-results-list" style="flex: 1; overflow-y: auto; padding-bottom: 20px;">
        </div>
      </div>
    </div>
  </div>

  <div id="view-detail" class="view-container">
    <div class="page-header">
      <button onclick="App.navigate('home')">⬅️</button>
      <h2 id="detail-title">餐廳名稱</h2>
      <button onclick="App.showAddToListModal()" title="加入清單" style="width: auto; padding: 4px 12px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; font-size: 14px; border: 1px solid var(--primary); color: var(--primary); background: white;">
        加入清單
      </button>
    </div>

    <div class="scrollable-content detail-padding">
      <div class="info-card">
        <h3 id="detail-brand" style="display:flex; justify-content:space-between; align-items:center;">
          品牌名稱
          <button onclick="App.showBrandRenameModal()" style="font-size:12px; padding:4px 8px; border-radius:12px; border:1px solid #FF7A00; background:white; color:#FF7A00; cursor:pointer;">✏️ 修改</button>
        </h3>
        <p id="detail-address">地址</p>
        <p id="detail-rating">⭐️評分</p>
        <div id="detail-lists-badges" style="margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px;"></div>
      </div>

      <div style="display:flex; gap:10px; margin-bottom: 20px;">
        <button class="action-btn btn-primary" onclick="App.addVisitDate()" style="margin-top:0; flex:1;">📅新增到訪日</button>
        <button class="action-btn" onclick="App.openInGoogleMaps()" style="margin-top:0; flex:1; background-color: #4285F4; border-color: #4285F4; color: white;">🗺️ Google 地圖</button>
      </div>

      <div class="section">
        <h3>歷史到訪紀錄</h3>
        <div id="detail-visits"></div>
      </div>

      <div class="section">
        <h3>餐點評價</h3>
        <div id="detail-menu"></div>
      </div>

      <div class="section">
        <h3>
          總評價 / 筆記
          <button onclick="App.addOverallReview()">+</button>
        </h3>
        <div id="detail-overall"></div>
      </div>
    </div>
  </div>

  <div id="view-lists" class="view-container">
    <div class="page-header">
      <button onclick="App.navigate('home')">⬅️</button>
      <h2>我的美食清單</h2>
    </div>
    
    <div style="padding: 10px 15px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10;">
      <input type="text" id="list-search-input" placeholder="🔍 搜尋清單或餐廳名稱..." onkeyup="App.renderLists()" style="width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; background: #F9FAFB;">
    </div>

    <div class="scrollable-content" id="my-lists-container" style="padding-bottom: 80px;">
      </div>

    <button class="fab" onclick="App.showCreateListModal()">
      ➕ 新增清單
    </button>
  </div>

  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal-box" id="modal-content"></div>
  </div>

  <script src="js/app.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcVWtQc4PP3T1Va16TtV5CA__B_T3tKJk&libraries=places&loading=async&callback=App.init" async defer></script>

</body>
</html>
